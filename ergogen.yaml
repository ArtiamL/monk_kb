units:
  U: 19.05
  kx: 14
  ky: 14

points:
  zones:
    matrix:
      anchor:
        rotate: 5
      columns:
        outer:
          key: {}
          rows:
            bottom.key: {}
            home.key: {}
            middle.key: {}
            top.key: {}
        pinky:
          key:
            origin: [0, -20]
            splay: -2
            stagger: 5
          rows:
            bottom.key: {}
            home.key: {}
            middle.key: {}
            top.key: {}
        ring:
          key:
            origin: [0, -20]
            splay: -2
            stagger: 15
          rows:
            bottom.key: {}
            home.key: {}
            middle.key: {}
            top.key: {}
        middle:
          key:
            origin: [0, -10]
            splay: -5
            stagger: 7
          rows:
            bottom.key: {}
            home.key: {}
            middle.key: {}
            top.key: {}
        index:
          key:
            splay: -2
            stagger: -3
          rows:
            bottom.key: {}
            home.key: {}
            middle.key: {}
            top.key: {}
        inner:
          key:
            splay: -2
            stagger: -5
          rows:
            bottom.key: {}
            home.key: {}
            middle.key: {}
            top.key: {}

    thumbfan:
      rotate: 5
      anchor:
        ref: matrix_inner_bottom
        shift: [-25, -25]
      columns:
        near:
          rows:
            thumb.key: {}
            top:
              skip: true
          key: {}
        middle:
          rows:
            thumb.key: {}
            top:
              skip: true
          key:
            spread: 20
            splay: -12
            origin: [-10, -9]
        middle2:
          rows:
            thumb.key: {}
            top:
              skip: true
          key:
            spread: 20
            splay: -12
            origin: [-10, -9]
        far:
          rows:
            thumb.key: {}
            top.key: {}
          key:
            spread: 20
            origin: [-10, -9]
      rows:
        thumb: {}
        top:
          width: 1.5U
          shift: [-10, 0]


netlist:
  rows:
    - matrix_bottom
    - matrix_home
    - matrix_middle
    - matrix_top
    - thumbfan_thumb
    - thumbfan_top
  cols:
    - matrix_outer
    - matrix_pinky
    - matrix_ring_thumbfan_near
    - matrix_middle_thumbfan_middle
    - matrix_index_thumbfan_middle2
    - matrix_inner_thumbfan_top_thumbfan_far

pcbs:
  main:
    footprints:
      # - where: true
      #   what: "ceoloide/mcu_supermini_nrf52840"
      #   adjust:
      #     shift: [0, -40]
      - where: keys
        what: "diode"

outlines:
  raw:
    - what: rectangle
      where: true
      size: [u+15, u+16]
      fillet: 2
  keys:
    - what: rectangle
      where: true
      size: [kx, ky]
  cutout:
    - name: raw
    - operation: subtract
      name: keys

cases:
  plate:
    - name: cutout
      extrude: 4
